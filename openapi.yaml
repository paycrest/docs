openapi: 3.0.3
info:
  title: Paycrest Aggregator API
  version: 1.0.0
  description: |
    OpenAPI schema for the Paycrest Aggregator API. This covers sender, provider, and general endpoints.
tags:
  - name: Sender
    description: Endpoints for senders to create and manage payment orders
  - name: Provider
    description: Endpoints for providers to manage and fulfill orders
  - name: General
    description: General protocol and utility endpoints
servers:
  - url: https://api.paycrest.io/v1
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: API-Key
  schemas:

    # Sender Schemas
    NewPaymentOrderPayload:
      type: object
      required:
        - amount
        - token
        - rate
        - network
        - recipient
      properties:
        amount:
          type: number
        token:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        rate:
          type: number
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain
        recipient:
          $ref: '#/components/schemas/PaymentOrderRecipient'
        reference:
          type: string
        returnAddress:
          type: string
    PaymentOrderRecipient:
      type: object
      required:
        - institution
        - accountIdentifier
        - accountName
        - memo
      properties:
        institution:
          type: string
          description: Institution code (SWIFT code or custom PayCrest code ending with 'PC'). See [Code Standards](/resources/code-standards) for details.
        accountIdentifier:
          type: string
          description: Bank account number, mobile number, or other account identifier
        accountName:
          type: string
          description: Name of the account holder
        memo:
          type: string
          description: Memo or reference for the transaction
        providerId:
          type: string
          description: Optional provider ID for specific routing
        metadata:
          type: object
          description: Additional metadata for the transaction
        currency:
          type: string
          description: ISO 4217 currency code (e.g., NGN, KES, UGX). See [Supported Currencies](/resources/supported-currencies) for available options.
    ReceiveAddressResponse:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        token:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain
        receiveAddress:
          type: string
        validUntil:
          type: string
          format: date-time
        senderFee:
          type: string
        transactionFee:
          type: string
        reference:
          type: string
        orderType:
          type: string
    SenderOrderResponse:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        amountInUsd:
          type: string
        amountPaid:
          type: string
        amountReturned:
          type: string
        token:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        senderFee:
          type: string
        transactionFee:
          type: string
        rate:
          type: string
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain
        gatewayId:
          type: string
        recipient:
          $ref: '#/components/schemas/PaymentOrderRecipient'
        fromAddress:
          type: string
        returnAddress:
          type: string
          description: Deprecated — use refundAddress
        refundAddress:
          type: string
        receiveAddress:
          type: string
        feeAddress:
          type: string
        reference:
          type: string
        orderType:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        txHash:
          type: string
        status:
          type: string
        transactionLogs:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
    SenderPaymentOrderList:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/SenderOrderResponse'
    SenderStatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
        totalOrderVolume:
          type: string
        totalFeeEarnings:
          type: string

    # Provider Schemas
    ProviderOrderList:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/ProviderOrderResponse'
    ProviderOrderResponse:
      type: object
      properties:
        id:
          type: string
        token:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        gatewayId:
          type: string
        amount:
          type: string
        amountInUsd:
          type: string
        rate:
          type: string
        blockNumber:
          type: integer
        txHash:
          type: string
        institution:
          type: string
          description: Institution code (SWIFT code or custom PayCrest code ending with 'PC'). See [Code Standards](/resources/code-standards) for details.
        accountIdentifier:
          type: string
        accountName:
          type: string
        providerId:
          type: string
        memo:
          type: string
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain
        orderType:
          type: string
        status:
          type: string
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        transactionLogs:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        cancellationReasons:
          type: array
          items:
            type: string
    AcceptOrderResponse:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        institution:
          type: string
          description: Institution code (SWIFT code or custom PayCrest code ending with 'PC'). See [Code Standards](/resources/code-standards) for details.
        accountIdentifier:
          type: string
        accountName:
          type: string
        memo:
          type: string
        metadata:
          type: object
    FulfillLockOrderPayload:
      type: object
      required:
        - psp
        - txId
      properties:
        psp:
          type: string
        txId:
          type: string
        validationStatus:
          type: string
        validationError:
          type: string
    CancelLockOrderPayload:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
    MarketRateResponse:
      type: object
      properties:
        marketBuyRate:
          type: string
        marketSellRate:
          type: string
        minimumRate:
          type: string
        maximumRate:
          type: string
    ProviderStatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
        totalFiatVolume:
          type: string
        totalCryptoVolume:
          type: string

    # General Schemas
    SupportedCurrencies:
      type: object
      properties:
        code:
          type: string
          description: ISO 4217 currency code (e.g., NGN, KES, UGX). See [Supported Currencies](/resources/supported-currencies) for available options.
        name:
          type: string
        shortName:
          type: string
        decimals:
          type: integer
        symbol:
          type: string
        marketBuyRate:
          type: string
        marketSellRate:
          type: string
    SupportedInstitutions:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
          description: Institution code (SWIFT code or custom PayCrest code ending with 'PC'). See [Code Standards](/resources/code-standards) for details.
        type:
          type: string
    SupportedTokenResponse:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        contractAddress:
          type: string
        decimals:
          type: integer
        baseCurrency:
          type: string
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain

    # Order Status Schemas
    ProviderOrderStatusResponse:
      type: object
      properties:
        orderId:
          type: string
        amount:
          type: string
        amountInUsd:
          type: string
        token:
          type: string
          description: Token symbol (USDT, USDC, cNGN). See [Supported Stablecoins](/resources/supported-stablecoins) for available options.
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
          description: Network identifier for the blockchain
        settlePercent:
          type: string
        status:
          type: string
        txHash:
          type: string
        settlements:
          type: array
          items:
            $ref: '#/components/schemas/PaymentOrderSplitOrder'
        txReceipts:
          type: array
          items:
            $ref: '#/components/schemas/PaymentOrderTxReceipt'
        updatedAt:
          type: string
          format: date-time
    PaymentOrderSplitOrder:
      type: object
      properties:
        splitOrderId:
          type: string
        amount:
          type: string
        rate:
          type: string
        orderPercent:
          type: string
    PaymentOrderTxReceipt:
      type: object
      properties:
        status:
          type: string
        txHash:
          type: string
        timestamp:
          type: string
          format: date-time

    # Common Schemas
    TransactionLog:
      type: object
      properties:
        id:
          type: string
        gateway_id:
          type: string
        status:
          type: string
        tx_hash:
          type: string
        created_at:
          type: string
          format: date-time

    # System Schemas
    VerifyAccountRequest:
      type: object
      required:
        - institution
        - accountIdentifier
      properties:
        institution:
          type: string
          description: Institution code (SWIFT code or custom PayCrest code ending with 'PC'). See [Code Standards](/resources/code-standards) for details.
        accountIdentifier:
          type: string
          description: Bank account number, mobile number, or other account identifier
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Error message
        data:
          nullable: true
          description: "null on most errors; an array of field-level errors on validation failures"
          oneOf:
            - type: "null"
            - type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
    StandardResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operation successful
        data:
          type: object
          description: The actual response data (e.g., ReceiveAddressResponse, etc.)

    # ─── V2 Schemas ────────────────────────────────────────────────────────────

    V2PaymentOrderPayload:
      type: object
      required:
        - amount
        - source
        - destination
      properties:
        amount:
          type: string
          description: Payment amount. Denomination is determined by `amountIn` (defaults to crypto units).
          example: "100"
        amountIn:
          type: string
          enum: [crypto, fiat]
          description: Specifies whether `amount` is denominated in crypto or fiat. Defaults to `crypto`.
        rate:
          type: string
          description: Quoted exchange rate (fiat per crypto unit). Optional — protocol uses best available rate if omitted.
        senderFee:
          type: string
          description: Fixed sender fee in crypto units.
        senderFeePercent:
          type: string
          description: Sender fee as a percentage of the order amount (alternative to senderFee).
        reference:
          type: string
          description: Your internal reference ID for this order.
        source:
          description: "Polymorphic source — set `type: \"crypto\"` for offramp or `type: \"fiat\"` for onramp."
          oneOf:
            - $ref: '#/components/schemas/V2CryptoSource'
            - $ref: '#/components/schemas/V2FiatSource'
          discriminator:
            propertyName: type
            mapping:
              crypto: '#/components/schemas/V2CryptoSource'
              fiat: '#/components/schemas/V2FiatSource'
        destination:
          description: "Polymorphic destination — set `type: \"fiat\"` for offramp or `type: \"crypto\"` for onramp."
          oneOf:
            - $ref: '#/components/schemas/V2FiatDestination'
            - $ref: '#/components/schemas/V2CryptoDestination'
          discriminator:
            propertyName: type
            mapping:
              fiat: '#/components/schemas/V2FiatDestination'
              crypto: '#/components/schemas/V2CryptoDestination'

    V2CryptoSource:
      type: object
      required: [type, currency, network, refundAddress]
      properties:
        type:
          type: string
          enum: [crypto]
        currency:
          type: string
          description: Stablecoin symbol (e.g. USDT, USDC, cNGN)
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon]
        refundAddress:
          type: string
          description: Wallet address for refunds if the order can't be fulfilled

    V2FiatSource:
      type: object
      required: [type, currency, refundAccount]
      properties:
        type:
          type: string
          enum: [fiat]
        currency:
          type: string
          description: Fiat currency code (e.g. NGN, KES, BRL)
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (optional)
        refundAccount:
          $ref: '#/components/schemas/V2FiatRefundAccount'

    V2FiatRefundAccount:
      type: object
      required: [institution, accountIdentifier, accountName]
      properties:
        institution:
          type: string
          description: Bank or mobile provider code (SWIFT prefix or Paycrest institution code)
        accountIdentifier:
          type: string
          description: Account number or mobile number
        accountName:
          type: string
          description: Account holder name

    V2FiatDestination:
      type: object
      required: [type, currency, recipient]
      properties:
        type:
          type: string
          enum: [fiat]
        currency:
          type: string
          description: Fiat currency code (e.g. NGN, KES)
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (optional)
        providerId:
          type: string
          description: Pin order to a specific provider (optional)
        recipient:
          $ref: '#/components/schemas/V2FiatRecipient'

    V2FiatRecipient:
      type: object
      required: [institution, accountIdentifier, accountName, memo]
      properties:
        institution:
          type: string
        accountIdentifier:
          type: string
        accountName:
          type: string
        memo:
          type: string
          description: Payment narration / reference

    V2CryptoDestination:
      type: object
      required: [type, currency, network, recipient]
      properties:
        type:
          type: string
          enum: [crypto]
        currency:
          type: string
          description: Stablecoin symbol (e.g. USDT, USDC)
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon]
        providerId:
          type: string
        recipient:
          $ref: '#/components/schemas/V2CryptoRecipient'

    V2CryptoRecipient:
      type: object
      required: [address, network]
      properties:
        address:
          type: string
          description: Wallet address to receive stablecoins
        network:
          type: string
          enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon]

    V2CryptoProviderAccount:
      type: object
      description: Returned for offramp orders — the address to send stablecoins to
      properties:
        network:
          type: string
        receiveAddress:
          type: string
          description: EVM address to send stablecoins to
        validUntil:
          type: string
          format: date-time
          description: Deadline for the stablecoin deposit

    V2FiatProviderAccount:
      type: object
      description: Returned for onramp orders — the virtual account to deposit fiat into
      properties:
        institution:
          type: string
          description: Bank or mobile provider code
        accountIdentifier:
          type: string
          description: Account number or mobile number to send fiat to
        accountName:
          type: string
        amountToTransfer:
          type: string
          description: Exact fiat amount the user must deposit
        currency:
          type: string
          description: Fiat currency code
        validUntil:
          type: string
          format: date-time
          description: Deadline — order expires if fiat not received by this time

    V2PaymentOrderResponse:
      type: object
      description: Response returned when creating an order
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        orderType:
          type: string
          enum: [regular, otc]
        timestamp:
          type: string
          format: date-time
        amount:
          type: string
          description: Crypto amount in token units
        rate:
          type: string
        senderFee:
          type: string
        senderFeePercent:
          type: string
        transactionFee:
          type: string
        reference:
          type: string
        providerAccount:
          description: Crypto provider account for offramp; fiat provider account (virtual account) for onramp
          oneOf:
            - $ref: '#/components/schemas/V2CryptoProviderAccount'
            - $ref: '#/components/schemas/V2FiatProviderAccount'
        source:
          oneOf:
            - $ref: '#/components/schemas/V2CryptoSource'
            - $ref: '#/components/schemas/V2FiatSource'
        destination:
          oneOf:
            - $ref: '#/components/schemas/V2FiatDestination'
            - $ref: '#/components/schemas/V2CryptoDestination'

    V2PaymentOrderGetResponse:
      type: object
      description: Response for a single order (or list item)
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [initiated, deposited, pending, fulfilling, fulfilled, validated, settling, settled, cancelled, refunding, refunded, expired]
        orderType:
          type: string
          enum: [regular, otc]
        direction:
          type: string
          enum: [offramp, onramp]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        amount:
          type: string
        amountInUsd:
          type: string
        amountPaid:
          type: string
        amountReturned:
          type: string
        percentSettled:
          type: string
        rate:
          type: string
        senderFee:
          type: string
        senderFeePercent:
          type: string
        transactionFee:
          type: string
        reference:
          type: string
        txHash:
          type: string
        providerAccount:
          oneOf:
            - $ref: '#/components/schemas/V2CryptoProviderAccount'
            - $ref: '#/components/schemas/V2FiatProviderAccount'
        source:
          oneOf:
            - $ref: '#/components/schemas/V2CryptoSource'
            - $ref: '#/components/schemas/V2FiatSource'
        destination:
          oneOf:
            - $ref: '#/components/schemas/V2FiatDestination'
            - $ref: '#/components/schemas/V2CryptoDestination'

    V2PaymentOrderListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/V2PaymentOrderGetResponse'

    V2WebhookPayload:
      type: object
      description: Webhook payload for v2 payment order events
      properties:
        event:
          type: string
          enum: [payment_order.deposited, payment_order.pending, payment_order.validated, payment_order.settling, payment_order.settled, payment_order.refunding, payment_order.refunded, payment_order.expired]
        webhookVersion:
          type: string
          enum: ["2"]
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            direction:
              type: string
              enum: [offramp, onramp]
            status:
              type: string
            amount:
              type: string
            amountInUsd:
              type: string
            amountPaid:
              type: string
            amountReturned:
              type: string
            percentSettled:
              type: string
            senderFee:
              type: string
            transactionFee:
              type: string
            rate:
              type: string
            gatewayId:
              type: string
            senderId:
              type: string
              format: uuid
            providerAccount:
              oneOf:
                - $ref: '#/components/schemas/V2CryptoProviderAccount'
                - $ref: '#/components/schemas/V2FiatProviderAccount'
            source:
              oneOf:
                - $ref: '#/components/schemas/V2CryptoSource'
                - $ref: '#/components/schemas/V2FiatSource'
            destination:
              oneOf:
                - $ref: '#/components/schemas/V2FiatDestination'
                - $ref: '#/components/schemas/V2CryptoDestination'
            fromAddress:
              type: string
            reference:
              type: string
            txHash:
              type: string
            timestamp:
              type: string
              format: date-time



paths:

  # Sender Endpoints
  /sender/orders:
    post:
      tags:
        - Sender
      summary: Initiate payment order
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPaymentOrderPayload'
      responses:
        '201':
          description: Payment order initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiveAddressResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Sender
      summary: List payment orders
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: token
          schema:
            type: string
        - in: query
          name: network
          schema:
            type: string
            enum: [ethereum, base, bnb-smart-chain, lisk, scroll, celo, arbitrum-one, polygon, asset-chain]
            description: Network identifier for the blockchain
        - in: query
          name: ordering
          schema:
            type: string
      responses:
        '200':
          description: List of payment orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SenderPaymentOrderList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sender/orders/{id}:
    get:
      tags:
        - Sender
      summary: Get payment order by ID
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment order
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SenderOrderResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sender/stats:
    get:
      tags:
        - Sender
      summary: Get sender stats
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Sender stats
          content:
            application/json:
              schema:

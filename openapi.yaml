  # ─── Provider Action Endpoints (v1) ─────────────────────────────────────────

  /provider/orders/{id}/accept:
    post:
      tags:
        - Provider
      summary: Accept an order
      description: Provider accepts an assigned order, signalling intent to fulfill.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /provider/orders/{id}/decline:
    post:
      tags:
        - Provider
      summary: Decline an order
      description: Provider declines an assigned order. The aggregator will reassign it to another provider.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /provider/orders/{id}/fulfill:
    post:
      tags:
        - Provider
      summary: Fulfill an order
      description: Provider reports that the fiat payment has been disbursed to the recipient.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                txId:
                  type: string
                  description: PSP transaction ID or reference for the payout
      responses:
        '200':
          description: Order fulfilled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /provider/orders/{id}/cancel:
    post:
      tags:
        - Provider
      summary: Cancel an order
      description: Provider cancels a previously accepted order. The aggregator will attempt reassignment.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for cancellation
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /provider/balances:
    post:
      tags:
        - Provider
      summary: Update provider balances
      description: Provider node reports current available liquidity balances per currency.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                balances:
                  type: array
                  items:
                    type: object
                    required:
                      - currency
                      - availableBalance
                    properties:
                      currency:
                        type: string
                        description: Fiat currency code (e.g. NGN, KES)
                      availableBalance:
                        type: string
                        description: Available balance in fiat units
      responses:
        '200':
          description: Balances updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized


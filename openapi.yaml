  # ─── V2 Sender Endpoints ─────────────────────────────────────────────────────

  /v2/sender/orders:
    post:
      tags:
        - Sender
      summary: Create a v2 payment order (offramp or onramp)
      description: |
        Creates a new payment order.

        - **Offramp** (stablecoin → fiat): set `source.type = "crypto"` and `destination.type = "fiat"`.
          The response `providerAccount` contains a `receiveAddress` to send tokens to.
        - **Onramp** (fiat → stablecoin): set `source.type = "fiat"` and `destination.type = "crypto"`.
          The response `providerAccount` contains a virtual bank account for the user to deposit fiat into.
      security:
        - ApiKeyAuth: []
      servers:
        - url: https://api.paycrest.io
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V2PaymentOrderPayload'
            examples:
              offramp:
                summary: Offramp — USDT on Base → NGN bank account
                value:
                  amount: "100"
                  source:
                    type: crypto
                    currency: USDT
                    network: base
                    refundAddress: "0xYourAddress"
                  destination:
                    type: fiat
                    currency: NGN
                    recipient:
                      institution: GTBINGLA
                      accountIdentifier: "1234567890"
                      accountName: John Doe
                      memo: Payment
              onramp:
                summary: Onramp — NGN → USDT on Base
                value:
                  amount: "50000"
                  amountIn: fiat
                  source:
                    type: fiat
                    currency: NGN
                    refundAccount:
                      institution: GTBINGLA
                      accountIdentifier: "1234567890"
                      accountName: John Doe
                  destination:
                    type: crypto
                    currency: USDT
                    network: base
                    recipient:
                      address: "0xRecipientWalletAddress"
                      network: base
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Payment order created successfully
                  data:
                    $ref: '#/components/schemas/V2PaymentOrderResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: No provider available for this corridor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Sender
      summary: List v2 payment orders
      security:
        - ApiKeyAuth: []
      servers:
        - url: https://api.paycrest.io
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: string
            enum: [initiated, deposited, pending, fulfilling, fulfilled, validated, settling, settled, cancelled, refunding, refunded, expired]
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    $ref: '#/components/schemas/V2PaymentOrderListResponse'
        '401':
          description: Unauthorized

  /v2/sender/orders/{id}:
    get:
      tags:
        - Sender
      summary: Get a v2 payment order by ID
      security:
        - ApiKeyAuth: []
      servers:
        - url: https://api.paycrest.io
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: V2 payment order
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    $ref: '#/components/schemas/V2PaymentOrderGetResponse'
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  # ─── V2 Provider Endpoints ────────────────────────────────────────────────────

  /v2/provider/orders:
    get:
      tags:
        - Provider
      summary: List v2 payment orders (provider)
      description: Returns a paginated list of payment orders assigned to the authenticated provider, in the v2 response schema. Requires a `currency` query parameter. Supports `search`, `export=csv`, `from`/`to` date filters, and `ordering` (asc/desc).
      security:
        - ApiKeyAuth: []
      servers:
        - url: https://api.paycrest.io
      parameters:
        - in: query
          name: currency
          required: true
          schema:
            type: string
            example: NGN
          description: Fiat currency to filter orders by (e.g. NGN, KES).
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: string
            enum: [initiated, deposited, pending, fulfilling, fulfilled, validated, settling, settled, cancelled, refunding, refunded, expired]
        - in: query
          name: ordering
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: search
          schema:
            type: string
          description: Search by order ID, reference, or account identifier.
        - in: query
          name: export
          schema:
            type: string
            enum: [csv]
          description: Pass `export=csv` with `from` and `to` to download a CSV export.
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Start date for CSV export (YYYY-MM-DD). Required when `export=csv`.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: End date for CSV export (YYYY-MM-DD). Required when `export=csv`.
      responses:
        '200':
          description: Paginated list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/V2PaymentOrderListResponse'
        '400':
          description: Bad request (e.g. missing currency)
        '401':
          description: Unauthorized

  /v2/provider/orders/{id}:
    get:
      tags:
        - Provider
      summary: Get a v2 payment order by ID (provider)
      description: Returns a single payment order assigned to the authenticated provider, including polymorphic source/destination, providerAccount, and transaction logs.
      security:
        - ApiKeyAuth: []
      servers:
        - url: https://api.paycrest.io
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the payment order.
      responses:
        '200':
          description: V2 payment order
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/V2PaymentOrderGetResponse'
        '401':
          description: Unauthorized
        '404':
          description: Order not found
